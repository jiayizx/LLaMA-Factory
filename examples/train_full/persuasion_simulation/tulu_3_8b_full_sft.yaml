### model
model_name_or_path: allenai/Llama-3.1-Tulu-3-8B-SFT
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
deepspeed: examples/deepspeed/ds_z3_config.json  # choices: [ds_z0_config.json, ds_z2_config.json, ds_z3_config.json]


### dataset
dataset: persuasion_simulation
template: llama3
cutoff_len: 4096
max_samples: 10000
overwrite_cache: true
preprocessing_num_workers: 16
train_on_prompt: true


### output
output_dir: saves/tulu_3_8b/full/sft/persuasion_simulation
logging_steps: 10
save_strategy: "epoch"
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 2
learning_rate: 5e-6 # 1.0e-5
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
push_to_hub: true
hub_model_id: "EleanorZzz/persuasion_simulation_tulu3_sft_w_promp_3epochs"


report_to: wandb
run_name: tulu_3_8b-full-sft-persuasion-simulation

